kind: Deployment
apiVersion: apps/v1
metadata:
  name: python-netcat-app
  labels:
    app: test-netcat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-netcat
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: test-netcat
        deployment: test-netcat
      annotations:
        openshift.io/generated-by: OpenShiftWebConsole
    spec:
      containers:
        - name: test-netcat
          image: 'image-registry.openshift-image-registry.svc:5000/ns/test-netcat:latest'
          ports:
            - containerPort: 5000
              protocol: TCP
          resources: {}
